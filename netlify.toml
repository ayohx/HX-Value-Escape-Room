[build]
  command = "npm install && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20.9.0"
  NPM_FLAGS = "--legacy-peer-deps"

# Protect API routes — must come before the catch-all
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = false

# SPA catch-all for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

